<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pu Zero AI</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/jpeg" href="/logo.jpg">
    <style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        #chat-history::-webkit-scrollbar {
            width: 4px;
        }
        #chat-history::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: flex;
        }
        .htmx-request.btn-send {
            display: none;
        }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-900">

    <div class="max-w-md mx-auto h-screen flex flex-col bg-white shadow-2xl relative overflow-hidden">
        
        <!-- Header -->
        <header class="glass-effect sticky top-0 z-10 border-b border-slate-100 p-4 flex items-center gap-3">
            <img src="/logo.jpg" alt="Logo" class="w-10 h-10 rounded-full object-cover ring-2 ring-blue-500/20">
            <div>
                <h1 class="font-bold text-lg leading-none">pu Zero AI</h1>
                <span class="text-xs text-green-500 flex items-center gap-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Online
                </span>
            </div>
        </header>

        <!-- Chat History -->
        <div id="chat-history" class="flex-1 overflow-y-auto p-4 space-y-4 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-fixed">
            <!-- Welcome Message -->
            <div class="flex justify-start">
                <div class="bg-gray-100 text-slate-700 p-3 rounded-2xl rounded-tl-none max-w-[85%] shadow-sm border border-slate-200">
                    Halo! Saya <strong>pu Zero AI</strong>. Ada yang bisa saya bantu hari ini?
                </div>
            </div>
            <!-- Dynamic Content Here -->
        </div>

        <!-- Typing Indicator -->
        <div id="indicator" class="htmx-indicator px-4 py-2">
            <div class="flex items-center gap-2 bg-slate-50 border border-slate-100 rounded-full px-4 py-2 w-max shadow-sm">
                <div class="flex gap-1">
                    <span class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-bounce"></span>
                    <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce [animation-delay:0.2s]"></span>
                    <span class="w-1.5 h-1.5 bg-blue-600 rounded-full animate-bounce [animation-delay:0.4s]"></span>
                </div>
                <span class="text-xs font-medium text-slate-500 italic">pu Zero sedang berpikir...</span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 glass-effect border-t border-slate-100">
            <form hx-post="/chat" 
                  hx-target="#chat-history" 
                  hx-swap="beforeend" 
                  hx-indicator="#indicator"
                  hx-on::after-request="this.reset(); document.getElementById('chat-history').scrollTo({top: document.getElementById('chat-history').scrollHeight, behavior: 'smooth'})"
                  class="flex items-center gap-2 bg-slate-100 rounded-3xl p-1 pl-4 border border-slate-200 focus-within:ring-2 focus-within:ring-blue-500/20 transition-all">
                
                <input type="text" 
                       name="prompt" 
                       placeholder="Ketik pesan..." 
                       class="flex-1 bg-transparent border-none focus:outline-none py-2 text-sm"
                       required
                       autocomplete="off">
                
                <button type="submit" class="btn-send bg-blue-600 text-white p-2.5 rounded-full hover:bg-blue-700 transition-colors shadow-md shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </form>
            <p class="text-[10px] text-center text-slate-400 mt-2">Powered by Gemini v2 & PuruAI</p>
        </div>

    </div>

    <script>
        // Auto-scroll to bottom on load
        window.onload = () => {
            const chat = document.getElementById('chat-history');
            chat.scrollTop = chat.scrollHeight;
        };
    </script>
</body>
</html>
